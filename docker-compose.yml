services:
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-progetto_riders}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: flask_app
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Sovrascrive SOLO l'host, perché in Docker non è "localhost" ma il container "db"
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
